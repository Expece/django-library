{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Fontawesome(for icons) -->
    <script src="https://kit.fontawesome.com/d9babc7854.js" crossorigin="anonymous"></script>
    <!-- My css -->
    <link rel="stylesheet" type="text/css" href="{% static 'main/css/style.css' %}">
    <title>MyLibrary</title>
</head>
<body>
    <aside class="aside">
        <a href="{% url 'home' %}" class="logo"><img src="{% static 'main/image/logo.svg' %}" alt="#" class="logo_img"></a>
        <div class="logo_text">Navigation</div>
        <ul>
            <a href="{% url 'library' %}" class="menu_link"><li><i class="fa-solid fa-book"></i> Library</li></a>
            <a href="{% url 'about' %}" class="menu_link"><li><i class="fa-solid fa-circle-question"></i> About</li></a>
        </ul>
    </aside>
    <main class="page">
        <div class="content_wrap">
            {% block content %}
            {% endblock %}
        </div>
    </main>
</body>
</html>
